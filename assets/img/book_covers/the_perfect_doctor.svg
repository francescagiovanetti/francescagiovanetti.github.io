<svg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">The Perfect Doctor book cover</title>
  <desc id="desc">A dark cover with the title The Perfect Doctor and a subtitle about artificial intelligence in healing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09162b"/>
      <stop offset="100%" stop-color="#162f59"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1200" fill="url(#bg)"/>
  <circle cx="625" cy="175" r="120" fill="#f0b84b" fill-opacity="0.16"/>
  <circle cx="150" cy="1030" r="180" fill="#8cc3ff" fill-opacity="0.1"/>
  <rect x="84" y="92" width="632" height="1016" rx="28" fill="none" stroke="#f4f7fb" stroke-opacity="0.18" stroke-width="2"/>
  <text x="92" y="210" fill="#f4f7fb" font-family="Georgia, serif" font-size="42" letter-spacing="6">BOOKSHELF</text>
  <text x="92" y="410" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="700">THE</text>
  <text x="92" y="510" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="700">PERFECT</text>
  <text x="92" y="610" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="700">DOCTOR</text>
  <text x="92" y="720" fill="#c9d5ea" font-family="Helvetica, Arial, sans-serif" font-size="34">Artificial Intelligence's Role</text>
  <text x="92" y="770" fill="#c9d5ea" font-family="Helvetica, Arial, sans-serif" font-size="34">in Healing Beyond Boundaries</text>
  <line x1="92" y1="840" x2="290" y2="840" stroke="#f0b84b" stroke-width="6"/>
  <text x="92" y="930" fill="#f0b84b" font-family="Helvetica, Arial, sans-serif" font-size="28" letter-spacing="5">AMAZON KINDLE</text>
</svg>
